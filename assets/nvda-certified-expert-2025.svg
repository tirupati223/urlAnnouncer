<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80">
  <!-- Background -->
  <rect width="220" height="80" rx="10" fill="white" stroke="#e0e0e0" stroke-width="1.5"/>

  <!-- Mandala / geometric badge icon (simplified, matches NV Access style) -->
  <g transform="translate(42,40)">
    <!-- Outer spiky ring -->
    <polygon points="0,-30 5,-22 12,-26 9,-18 18,-16 12,-10 20,-5 13,-2 18,6 10,6 10,15 4,10 0,18 -4,10 -10,15 -10,6 -18,6 -13,-2 -20,-5 -12,-10 -18,-16 -9,-18 -12,-26 -5,-22" fill="none" stroke="#e67e22" stroke-width="2"/>
    <!-- Middle ring -->
    <circle cx="0" cy="0" r="19" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="11" fill="none" stroke="#1abc9c" stroke-width="2"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="5" fill="none" stroke="#1abc9c" stroke-width="2"/>
    <!-- Inner petals -->
    <ellipse cx="0" cy="-8" rx="3" ry="5" fill="none" stroke="#9b59b6" stroke-width="1.2" transform="rotate(0)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="5" fill="none" stroke="#9b59b6" stroke-width="1.2" transform="rotate(60)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="5" fill="none" stroke="#9b59b6" stroke-width="1.2" transform="rotate(120)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="5" fill="none" stroke="#9b59b6" stroke-width="1.2" transform="rotate(180)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="5" fill="none" stroke="#9b59b6" stroke-width="1.2" transform="rotate(240)"/>
    <ellipse cx="0" cy="-8" rx="3" ry="5" fill="none" stroke="#9b59b6" stroke-width="1.2" transform="rotate(300)"/>
  </g>

  <!-- Text: NVDA -->
  <text x="100" y="22" font-family="Arial, sans-serif" font-weight="bold" font-size="15" fill="#2c2c6c" text-anchor="start">NVDA</text>
  <!-- Text: Certified -->
  <text x="100" y="40" font-family="Arial, sans-serif" font-weight="bold" font-size="13" fill="#2c2c6c" text-anchor="start">Certified</text>
  <!-- Text: Expert -->
  <text x="100" y="56" font-family="Arial, sans-serif" font-weight="bold" font-size="13" fill="#2c2c6c" text-anchor="start">Expert</text>
  <!-- Text: 2025 -->
  <text x="100" y="72" font-family="Arial, sans-serif" font-weight="bold" font-size="16" fill="#1abc9c" text-anchor="start">2025</text>
</svg>
